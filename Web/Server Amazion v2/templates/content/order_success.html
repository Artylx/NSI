{% extends "common.html" %}

{% block styles %}
<style>

.success-container {
    max-width: 700px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    animation: pop 0.4s ease;
}

@keyframes pop {
    from {
        transform: scale(0.95);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.success-icon {
    font-size: 60px;
    margin-bottom: 10px;
}

h1 {
    color: #2e7d32;
    margin-bottom: 10px;
}

.subtitle {
    color: #666;
    margin-bottom: 25px;
}

.order-box {
    text-align: left;
    background: #f7f7f7;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

.order-box h3 {
    margin-bottom: 10px;
    text-align: center;
}

.total {
    margin-top: 15px;
    font-weight: bold;
    font-size: 18px;
    text-align: right;
}

.btn {
    margin-top: 25px;
    display: inline-block;
    padding: 12px 18px;
    background: linear-gradient(135deg, #1e88e5, #42a5f5);
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

</style>
{% endblock %}

{% block content %}

<div class="success-container">

    <div class="success-icon">🎉</div>

    <h1>Paiement réussi !</h1>

    <p class="subtitle">
        Votre commande a bien été enregistrée.
    </p>

    <div class="order-box">

        <h3>Commande #{{ order.id }}</h3>

        <div class="total">
            Total : {{ order.total }} €
        </div>

    </div>

    <a href="{{ url_for('home') }}" class="btn">
        Retour à la boutique
    </a>

</div>

{% endblock %}
