{% extends "left.html" %}

{% block styles %}
{{ super() }}
<style>
        /* ===== PAGE REGISTER ===== */

        body {
            background: linear-gradient(135deg, #1e88e5, #42a5f5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            background: white;
            padding: 45px;
            width: 380px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: fadeIn 0.6s ease;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 26px;
            color: #1e1e2f;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 6px;
            color: #555;
        }

        input[type="text"],
        input[type="password"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            font-size: 14px;
            transition: 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #1e88e5;
            outline: none;
            box-shadow: 0 0 0 3px rgba(30,136,229,0.15);
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #1e88e5, #42a5f5);
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            margin: 20px 0;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30,136,229,0.3);
        }

        .container p {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .container a {
            color: #1e88e5;
            font-weight: bold;
            text-decoration: none;
        }

        .container a:hover {
            text-decoration: underline;
        }

        /* Animation douce */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
</style>
{% endblock %}

{% block content %}

<div class="container">

    <h2>Créer un compte</h2>

    <form method="post" action="{{ url_for('register_page') }}">

        <label>Nom utilisateur</label>
        <input type="text" name="username">

        <label>Email</label>
        <input type="text" name="mail" required>

        <label>Mot de passe</label>
        <input type="password" name="password" required>

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        <input type="submit" value="Créer le compte">

    </form>

    <p>Déjà un compte ?
        <a href="{{ url_for('connection_page') }}">Connexion</a>
    </p>

</div>

{% endblock %}
