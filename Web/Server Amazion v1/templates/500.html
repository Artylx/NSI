<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Erreur serveur</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
        }

        p {
            font-size: 20px;
            margin: 20px 0;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            background-color: white;
            color: #ff4e50;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background-color: #ffe5e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>500</h1>
        <p>Oups… Une erreur interne est survenue sur le serveur.</p>
        <a href="/">Retour à l’accueil</a>
    </div>
</body>
</html>
